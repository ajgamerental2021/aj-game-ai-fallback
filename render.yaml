services:
  - type: web
    name: line-dialogflow-ai-fallback
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: MEMORY_TTL_SECONDS
        value: "604800"
      - key: AI_TIMEOUT_MS
        value: "3500"
      - key: INVENTORY_SHEET_ID
        value: 13QZWpd_E-L_0G_Xd0zSL5_OcgV4sdwk9febXZSkZepc
      - key: INVENTORY_GID
        value: "1879984026"
      - key: INVENTORY_CACHE_MS
        value: "60000"
      - key: INVENTORY_FETCH_TIMEOUT_MS
        value: "3000"
      - key: GAME_DATA_URL
        value: https://gist.github.com/ajgamerental2021/4c37e6a92859ce10f353d2ccb1ecbabd/raw/b5ae091ddb5cd977f68ca6c447c7f8a2afde46df/ajgame-data.json
      - key: GAME_DATA_CACHE_MS
        value: "300000"
      - key: GAME_DATA_FETCH_TIMEOUT_MS
        value: "3000"
      - key: ADMIN_TOKEN
        sync: false
      - key: PAUSED_REPLY_TEXT
        value: ""
      - key: PAUSE_SHEET_ID
        value: 13QZWpd_E-L_0G_Xd0zSL5_OcgV4sdwk9febXZSkZepc
      - key: PAUSE_SHEET_GID
        value: ""
      - key: PAUSE_SHEET_CACHE_MS
        value: "30000"
      - key: PAUSE_SHEET_FETCH_TIMEOUT_MS
        value: "3000"
      - key: PAUSE_WEBHOOK_URL
        sync: false
  - type: cron
    name: line-dialogflow-ai-fallback-ping
    env: node
    schedule: "*/10 * * * *"
    buildCommand: npm install
    startCommand: npm run ping
    envVars:
      - key: PING_URL
        sync: false
